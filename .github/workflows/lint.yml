name: Lint

on:
  push:
    branches: [main]
  pull_request:

# One run per ref; a new push cancels the previous run.
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # oxlint/oxfmt ship prebuilt binaries and need no build step, so skip
      # postinstall (nuxt prepare, native builds) to keep this fast.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm run lint

      # Run even if lint failed so both problems surface in one run.
      - name: Check formatting
        if: ${{ !cancelled() }}
        run: pnpm run format:check
