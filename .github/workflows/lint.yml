name: Lint

on:
  push:
    branches: [main]
  pull_request:

# One run per ref; a new push cancels the previous run.
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # oxlint/oxfmt/tsgolint ship prebuilt binaries and need no build step, so
      # skip postinstall (native builds) to keep this fast.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Type-aware lint needs Nuxt's generated types so auto-imports resolve;
      # --ignore-scripts skipped the postinstall that normally does this.
      - name: Generate Nuxt types
        run: pnpm --filter teley exec nuxt prepare

      - name: Lint
        run: pnpm run lint

      # Run even if lint failed so both problems surface in one run.
      - name: Check formatting
        if: ${{ !cancelled() }}
        run: pnpm run format:check
