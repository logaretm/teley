services:
  teley:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8787:8787'
    volumes:
      - teley-data:/app/state
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  teley-data:
