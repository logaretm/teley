<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main circle background -->
  <circle cx="24" cy="24" r="24" fill="#18181B"/>
  
  <!-- Trace spans - horizontal bars at different lengths representing a waterfall -->
  <g opacity="0.9">
    <!-- Top span - longest -->
    <rect x="12" y="14" width="24" height="3" rx="1.5" fill="#5AC8D8"/>
    
    <!-- Second span - medium, offset -->
    <rect x="16" y="20" width="18" height="3" rx="1.5" fill="#E8A86D"/>
    
    <!-- Third span - shorter, more offset -->
    <rect x="20" y="26" width="14" height="3" rx="1.5" fill="#D4D4D8"/>
    
    <!-- Fourth span - shortest, most offset -->
    <rect x="24" y="32" width="10" height="3" rx="1.5" fill="#A1A1AA"/>
  </g>
  
  <!-- Subtle connection lines showing hierarchy -->
  <g opacity="0.3" stroke="#71717A" stroke-width="1">
    <line x1="14" y1="17" x2="18" y2="20"/>
    <line x1="18" y1="23" x2="22" y2="26"/>
    <line x1="22" y1="29" x2="26" y2="32"/>
  </g>
</svg>

